<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- Premium SEO Architecture -->
  <title>AlurKarya - Private Workspace & Kanban Dashboard</title>
  <meta name="description" content="AlurKarya is an ultra-premium visual Kanban dashboard designed for creative freelancers, developers, and consultants. Manage your clients, track delivery checklists, monitor revision cycles, log invoices, and curate stunning portfolio case studies.">
  <meta name="keywords" content="freelancer project board, trello for freelancers, client revisions tracker, freelance invoicing planner, visual workspace tools">
  <meta name="author" content="Antigravity Studio">
  
  <!-- OpenGraph Visual Metadata -->
  <meta property="og:title" content="AlurKarya - Private Workspace & Kanban Dashboard">
  <meta property="og:description" content="Manage your clients, due dates, revision rounds, files, and billing operations in one premium private workspace.">
  <meta property="og:type" content="website">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Accessibility Hidden Header for SEO Parsing -->
  <h1 class="d-none">AlurKarya - Ultimate Workspace Dashboard</h1>

  <!-- Primary React-like Application Root Mounting Container -->
  <div id="app-root">
    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #020617; color: #f8fafc; font-family: sans-serif; gap: 14px;">
      <div style="width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.1); border-radius: 50%; border-top-color: #8b5cf6; animation: spin 1s linear infinite;"></div>
      <span style="font-weight: 500; font-size: 0.95rem; letter-spacing: 0.05em; color: #94a3b8;">Booting Workspace OS...</span>
    </div>
  </div>

  <!-- Loading Animation Styling Block -->
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Modular Main Orchestration Script Loading -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
