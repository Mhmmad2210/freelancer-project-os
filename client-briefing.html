<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Briefing Snapshot - AlurKarya</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #080c14;
      --card-bg: rgba(17, 24, 39, 0.6);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-light: #e5e7eb;
      --color-primary: #8b5cf6;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-indigo: #6366f1;
      --color-slate: #64748b;
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
      background-attachment: fixed;
    }

    .container {
      max-width: 840px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .header-box {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .brand-logo svg {
      height: 24px;
      width: auto;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
      font-weight: 700;
      margin: 0;
    }

    h1 {
      font-size: 1.8rem;
      color: var(--text-light);
      margin-top: 6px;
    }

    h2 {
      font-size: 1.25rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .grid-three {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .meta-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    .meta-val {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-light);
    }

    /* Big Picture columns */
    .grid-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin: 16px 0;
    }

    .list-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      font-weight: 700;
    }

    ul.bullet-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    ul.bullet-list li {
      font-size: 0.82rem;
      color: var(--text-light);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .bullet-check {
      color: var(--color-success);
      font-weight: bold;
    }

    .bullet-dot {
      color: var(--color-indigo);
      font-weight: bold;
    }

    .callout-box {
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .callout-title {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .callout-content {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .milestone-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 12px;
    }

    .milestone-badge {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-light);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* Links & Delivery Section */
    .link-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      padding: 12px 16px;
      border-radius: 8px;
    }

    .link-label {
      font-size: 0.82rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .btn-link {
      background: var(--color-primary);
      color: white;
      text-decoration: none;
      font-size: 0.78rem;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-link:hover {
      background: #7c3aed;
    }

    /* Profile / Footer metadata */
    .freelancer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
      margin-top: 12px;
    }

    .freelancer-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .freelancer-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-light);
    }

    .freelancer-role {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .disclaimer-box {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 20px;
    }

    /* Error / Empty states */
    .error-container {
      text-align: center;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .error-title {
      font-size: 1.5rem;
      color: var(--color-danger);
    }

    .error-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 420px;
    }

    @media (max-width: 580px) {
      .header-box {
        flex-direction: column;
        align-items: flex-start;
      }
      .grid-columns {
        grid-template-columns: 1fr;
      }
    }

    /* --- Client Mode Visual Alignment Styles --- */
    .client-mode-shell {
      min-height: 100vh;
      min-height: 100svh;
      background:
        radial-gradient(circle at 50% 20%, rgba(124, 92, 255, 0.12), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(31, 214, 255, 0.06), transparent 26%),
        #070b13;
      color: #f8fafc;
      padding: 32px;
      box-sizing: border-box;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .client-mode-header {
      width: min(100%, 1180px);
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-sizing: border-box;
    }

    .client-mode-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .client-mode-logo {
      width: 180px;
      max-width: 70vw;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .client-mode-badge {
      border: 1px solid rgba(157, 110, 255, 0.35);
      background: rgba(124, 92, 255, 0.14);
      color: #b995ff;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .client-mode-back-btn {
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: rgba(248,250,252,0.86);
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 160ms ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .client-mode-back-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.16);
      color: #ffffff;
    }

    .client-mode-empty-card {
      width: min(100%, 860px);
      margin: 88px auto 0;
      padding: 72px 48px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
      box-sizing: border-box;
    }

    .client-empty-brand {
      text-align: center;
    }

    .client-empty-logo {
      width: 220px;
      max-width: 70vw;
      height: auto;
      display: block;
      margin: 0 auto 24px;
      object-fit: contain;
    }

    .client-empty-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(157, 110, 255, 0.35);
      background: rgba(124, 92, 255, 0.14);
      color: #b995ff;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .client-mode-empty-card h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .client-mode-empty-card p {
      max-width: 640px;
      margin: 0 auto;
      color: rgba(248, 250, 252, 0.74);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .client-mode-note {
      margin-top: 22px !important;
      color: rgba(248, 250, 252, 0.54) !important;
      font-size: 0.92rem !important;
    }

    @media (max-width: 768px) {
      .client-mode-header {
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }
      .client-mode-empty-card {
        margin-top: 48px;
        padding: 40px 24px;
        border-radius: 24px;
      }
      .client-mode-logo {
        width: 150px;
      }
    }

    @media (max-width: 580px) {
      .client-empty-logo {
        width: 168px;
        margin-bottom: 20px;
      }

      .client-mode-empty-card {
        padding: 42px 22px;
        border-radius: 26px;
      }

      .client-mode-empty-card h1 {
        font-size: 2rem;
      }

      .client-mode-empty-card p {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>

  <div class="container" id="briefing-root">
    <!-- Standalone Loading Placeholder -->
    <div style="text-align: center; padding: 100px 0; color: var(--text-secondary);">
      Loading snapshot data...
    </div>
  </div>

  <script>
    // Localized dictionary matching active briefing states
    const i18n = {
      en: {
        briefingTitle: "Project Update Snapshot",
        projectOverview: "Project Overview",
        status: "Status",
        deadline: "Deadline",
        category: "Category",
        freelancer: "Freelancer",
        bigPictureOverview: "Big Picture Overview",
        whatsDone: "What's Done",
        whatsNext: "What's Next",
        waitingFor: "Waiting For",
        decisionNeeded: "Action Needed",
        nextMilestone: "Next Milestone",
        deliverables: "Review & Handover Links",
        previewLink: "Preview/Review Link",
        finalFiles: "Final Handover Link",
        invoicePayment: "Invoice & Payment Status",
        invoiceNumber: "Invoice Number",
        paymentStatus: "Payment Status",
        amountDue: "Amount Due",
        amountPaid: "Amount Paid",
        notes: "Notes",
        beforeMeeting: "Sebelum Meeting",
        generatedOn: "Generated on",
        disclaimer: "This snapshot can be viewed by anyone who has the link. Only client-safe data is included.",
        limitation: "This snapshot reflects the project status at the time it was generated.",
        errorTitle: "Briefing Load Failed",
        noData: "No briefing snapshot data found in URL hash. Please check your link.",
        handoverNotes: "Handover & Setup Notes"
      },
      id: {
        briefingTitle: "Snapshot Briefing Client",
        projectOverview: "Ringkasan Project",
        status: "Status",
        deadline: "Tenggat Waktu",
        category: "Kategori",
        freelancer: "Freelancer",
        bigPictureOverview: "Gambaran Project",
        whatsDone: "Sudah Selesai",
        whatsNext: "Next Step",
        waitingFor: "Menunggu",
        decisionNeeded: "Action yang Dibutuhkan",
        nextMilestone: "Milestone Berikutnya",
        deliverables: "Link Review & Handover",
        previewLink: "Link Preview/Review",
        finalFiles: "Link Handover Final",
        invoicePayment: "Status Invoice & Pembayaran",
        invoiceNumber: "Nomor Invoice",
        paymentStatus: "Status Pembayaran",
        amountDue: "Sisa Tagihan",
        amountPaid: "Jumlah Dibayar",
        notes: "Catatan",
        beforeMeeting: "Sebelum Meeting",
        generatedOn: "Dibuat pada",
        disclaimer: "Snapshot ini dapat dilihat oleh siapa saja yang memiliki link ini. Hanya data aman client yang disertakan.",
        limitation: "Snapshot ini mencerminkan status project saat link dibuat.",
        errorTitle: "Gagal Memuat Briefing",
        noData: "Data briefing snapshot tidak ditemukan di hash URL. Silakan periksa kembali link Anda.",
        handoverNotes: "Catatan Handover & Setup"
      }
    };

    function safeUrl(urlString) {
      if (!urlString) return '';
      const trimmed = urlString.trim();
      if (/^https?:\/\/[^\s$.?#].[^\s]*$/i.test(trimmed)) {
        return trimmed;
      }
      return '';
    }

    function renderError(message) {
      const isIndoBrowser = navigator.language && navigator.language.toLowerCase().startsWith('id');
      document.body.innerHTML = `
        <div class="client-mode-shell">
          <header class="client-mode-header">
            <div class="client-mode-brand">
              <img src="./assets/brand/alurkarya-logo-secondary-white.svg" alt="AlurKarya" class="client-mode-logo" />
              <span class="client-mode-badge">Client Dashboard</span>
            </div>
            <a class="client-mode-back-btn" href="/">
              ${isIndoBrowser ? 'Kembali ke pilihan mode' : 'Back to mode selection'}
            </a>
          </header>

          <main class="client-mode-empty-card">
            <div class="client-empty-brand">
              <img src="./assets/brand/alurkarya-logo-secondary-white.svg" alt="AlurKarya" class="client-empty-logo" />
              <span class="client-empty-badge">Client Dashboard</span>
            </div>
            <h1>${isIndoBrowser ? 'Buka briefing project Anda' : 'Open your project briefing'}</h1>
            <p>
              ${isIndoBrowser 
                ? 'Gunakan link briefing yang dikirim oleh freelancer untuk melihat status project, next step, link review, dan update invoice/payment yang aman untuk client.' 
                : 'Use the briefing link sent by your freelancer to view the latest project status, next step, review links, and safe invoice/payment update.'}
            </p>
            ${message && message !== 'Snapshot string is missing or empty.' && !message.includes('not found') && !message.includes('tidak ditemukan')
              ? `<div style="font-size: 0.85rem; color: #f87171; background: rgba(239, 68, 68, 0.08); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.15); display: inline-block; margin-top: 16px;">⚠️ ${message}</div>` 
              : ''}
            <p class="client-mode-note">
              ${isIndoBrowser 
                ? 'Tampilan AlurKarya ini hanya menampilkan informasi project yang aman untuk client.' 
                : 'This AlurKarya view only shows client-safe project information.'}
            </p>
          </main>
        </div>
      `;
    }

    function formatDateStr(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        return '';
      }
    }

    function renderBriefing() {
      const root = document.getElementById('briefing-root');
      
      // 1. Decode Snapshot from hash
      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#snapshot=')) {
        const isIndoBrowser = navigator.language && navigator.language.toLowerCase().startsWith('id');
        const emptyMsg = isIndoBrowser 
          ? "Snapshot briefing client tidak ditemukan." 
          : "No client briefing snapshot found.";
        renderError(emptyMsg, true);
        return;
      }

      const encodedPayload = hash.split('snapshot=')[1];
      if (!encodedPayload) {
        renderError("Snapshot string is missing or empty.");
        return;
      }

      let payload = null;
      try {
        // Decode UTF-8 Base64 safely
        const decodedStr = decodeURIComponent(escape(atob(encodedPayload)));
        payload = JSON.parse(decodedStr);
      } catch (e) {
        console.error(e);
        renderError("Failed to parse snapshot payload. The link might be truncated or corrupted.");
        return;
      }

      if (!payload || !payload.bigPicture) {
        renderError("The snapshot is missing critical project overview structures.");
        return;
      }

      const lang = payload.lang === 'id' ? 'id' : 'en';
      const t = i18n[lang];

      // Setup state badges style
      const bp = payload.bigPicture;
      let badgeBg = 'linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.03))';
      let badgeBorder = '1px solid rgba(16, 185, 129, 0.3)';
      let badgeText = '#34d399';

      if (bp.overallStatus === 'needs_client_review') {
        badgeBg = 'linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.03))';
        badgeBorder = '1px solid rgba(245, 158, 11, 0.3)';
        badgeText = '#fbbf24';
      } else if (bp.overallStatus === 'in_revision') {
        badgeBg = 'linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(99, 102, 241, 0.03))';
        badgeBorder = '1px solid rgba(99, 102, 241, 0.3)';
        badgeText = '#818cf8';
      } else if (bp.overallStatus === 'ready_for_delivery') {
        badgeBg = 'linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(236, 72, 153, 0.03))';
        badgeBorder = '1px solid rgba(236, 72, 153, 0.3)';
        badgeText = '#f472b6';
      } else if (bp.overallStatus === 'invoice_sent') {
        badgeBg = 'linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(14, 165, 233, 0.03))';
        badgeBorder = '1px solid rgba(14, 165, 233, 0.3)';
        badgeText = '#38bdf8';
      } else if (bp.overallStatus === 'waiting_payment') {
        badgeBg = 'linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.03))';
        badgeBorder = '1px solid rgba(239, 68, 68, 0.3)';
        badgeText = '#f87171';
      } else if (bp.overallStatus === 'completed') {
        badgeBg = 'linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05))';
        badgeBorder = '1px solid rgba(16, 185, 129, 0.4)';
        badgeText = '#34d399';
      } else if (bp.overallStatus === 'needs_setup') {
        badgeBg = 'linear-gradient(135deg, rgba(100, 116, 139, 0.15), rgba(100, 116, 139, 0.03))';
        badgeBorder = '1px solid rgba(100, 116, 139, 0.3)';
        badgeText = '#94a3b8';
      }

      let calloutBg = 'rgba(255,255,255,0.02)';
      let calloutBorder = 'rgba(255,255,255,0.05)';
      if (bp.overallStatus === 'needs_client_review' || bp.overallStatus === 'invoice_sent' || bp.overallStatus === 'waiting_payment') {
        calloutBg = 'rgba(245, 158, 11, 0.04)';
        calloutBorder = 'rgba(245, 158, 11, 0.15)';
      } else if (bp.overallStatus === 'completed') {
        calloutBg = 'rgba(16, 185, 129, 0.04)';
        calloutBorder = 'rgba(16, 185, 129, 0.15)';
      }

      root.innerHTML = '';

      // Create primary container DOM tree securely
      const wrapper = document.createElement('div');
      wrapper.style.display = 'flex';
      wrapper.style.flexDirection = 'column';
      wrapper.style.gap = '24px';

      // 1. HEADER CARD
      const headerCard = document.createElement('div');
      headerCard.className = 'card';
      headerCard.innerHTML = `
        <div class="header-box">
          <div>
            <div class="brand-logo" style="margin-bottom: 16px;">
              <img src="./assets/brand/alurkarya-logo-secondary-white.svg" alt="AlurKarya" style="height: 24px; width: auto; display: block; object-fit: contain;" />
            </div>
            <h1 id="proj-title"></h1>
            <span style="font-size: 0.8rem; color: var(--text-secondary);">Client: <strong id="cli-name" style="color: var(--text-light);"></strong></span>
          </div>
          <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
            <span class="status-badge" style="background: ${badgeBg}; border: ${badgeBorder}; color: ${badgeText};">
              ${bp.overallStatusLabel}
            </span>
          </div>
        </div>

        <div class="grid-three">
          <div class="meta-item">
            <span class="meta-label">${t.status}</span>
            <span class="meta-val" id="meta-status-lbl"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">${t.deadline}</span>
            <span class="meta-val" id="meta-deadline-lbl"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">${t.category}</span>
            <span class="meta-val" id="meta-category-lbl"></span>
          </div>
        </div>
      `;
      headerCard.querySelector('#proj-title').textContent = payload.projectTitle || '';
      headerCard.querySelector('#cli-name').textContent = payload.clientName || '';
      headerCard.querySelector('#meta-status-lbl').textContent = bp.overallStatusLabel || '';
      headerCard.querySelector('#meta-deadline-lbl').textContent = payload.deadline || '';
      headerCard.querySelector('#meta-category-lbl').textContent = payload.category || '';
      wrapper.appendChild(headerCard);

      // 2. BIG PICTURE CARD
      const bpCard = document.createElement('div');
      bpCard.className = 'card';
      bpCard.style.display = 'flex';
      bpCard.style.flexDirection = 'column';
      bpCard.style.gap = '20px';

      bpCard.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;">
          <h2>✨ ${t.bigPictureOverview}</h2>
        </div>

        <p style="font-size: 0.88rem; line-height: 1.5; color: var(--text-light); margin: 0;" id="bp-summary"></p>

        <div class="grid-columns">
          <div>
            <div class="list-title">${t.whatsDone}</div>
            <ul class="bullet-list" id="bp-done-list"></ul>
          </div>
          <div>
            <div class="list-title">${t.whatsNext}</div>
            <ul class="bullet-list" id="bp-next-list"></ul>
          </div>
        </div>

        <div class="callout-box" style="background: ${calloutBg}; border: 1px solid ${calloutBorder};">
          <div class="callout-title">⏳ ${t.waitingFor}: <strong style="color: var(--text-light);" id="bp-waiting-lbl"></strong></div>
          <div class="callout-content">
            <strong>${t.decisionNeeded}:</strong> <span id="bp-decision-lbl"></span>
          </div>
        </div>

        <div class="milestone-bar">
          <span>🏁 ${t.nextMilestone}:</span>
          <span class="milestone-badge" id="bp-milestone-lbl"></span>
        </div>
      `;
      bpCard.querySelector('#bp-summary').textContent = bp.overviewSummary || '';
      bpCard.querySelector('#bp-waiting-lbl').textContent = bp.waitingFor || '';
      bpCard.querySelector('#bp-decision-lbl').textContent = bp.decisionNeeded || '';
      bpCard.querySelector('#bp-milestone-lbl').textContent = bp.nextMilestone || '';

      const doneUl = bpCard.querySelector('#bp-done-list');
      bp.whatIsDone.forEach(item => {
        const li = document.createElement('li');
        const bullet = document.createElement('span');
        bullet.className = 'bullet-check';
        bullet.textContent = '✓';
        const txt = document.createElement('span');
        txt.textContent = item;
        li.appendChild(bullet);
        li.appendChild(txt);
        doneUl.appendChild(li);
      });

      const nextUl = bpCard.querySelector('#bp-next-list');
      bp.whatIsNext.forEach(item => {
        const li = document.createElement('li');
        const bullet = document.createElement('span');
        bullet.className = 'bullet-dot';
        bullet.textContent = '•';
        const txt = document.createElement('span');
        txt.textContent = item;
        li.appendChild(bullet);
        li.appendChild(txt);
        nextUl.appendChild(li);
      });

      wrapper.appendChild(bpCard);

      // 3. REVIEW & DELIVERIES CARD (IF APPLICABLE)
      const dev = payload.delivery;
      const reviewUrlVal = safeUrl(dev.reviewLink || dev.previewLink || dev.draftLink);
      const finalUrlVal = safeUrl(dev.finalFileLink);

      if (reviewUrlVal || finalUrlVal || dev.clientVisibleNotes) {
        const deliveryCard = document.createElement('div');
        deliveryCard.className = 'card';
        deliveryCard.style.display = 'flex';
        deliveryCard.style.flexDirection = 'column';
        deliveryCard.style.gap = '16px';
        deliveryCard.innerHTML = `
          <h2>📦 ${t.deliverables}</h2>
          <div class="link-group" id="links-group-box"></div>
        `;

        const group = deliveryCard.querySelector('#links-group-box');
        if (reviewUrlVal) {
          const div = document.createElement('div');
          div.className = 'link-item';
          div.innerHTML = `
            <span class="link-label">${t.previewLink}</span>
            <a class="btn-link" target="_blank" rel="noopener noreferrer">Open</a>
          `;
          div.querySelector('a').href = reviewUrlVal;
          group.appendChild(div);
        }
        if (finalUrlVal) {
          const div = document.createElement('div');
          div.className = 'link-item';
          div.innerHTML = `
            <span class="link-label">${t.finalFiles}</span>
            <a class="btn-link" target="_blank" rel="noopener noreferrer" style="background: var(--color-success);">Download</a>
          `;
          div.querySelector('a').href = finalUrlVal;
          group.appendChild(div);
        }

        if (dev.clientVisibleNotes) {
          const notesBox = document.createElement('div');
          notesBox.style.cssText = 'background: rgba(255,255,255,0.02); border-left: 4px solid var(--color-primary); padding: 12px 16px; border-radius: 4px; margin-top: 8px;';
          notesBox.innerHTML = `
            <div style="font-size: 0.72rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; font-weight: 700;">${t.handoverNotes}</div>
            <p style="font-size: 0.82rem; margin: 0; color: var(--text-light); white-space: pre-wrap;" id="notes-content"></p>
          `;
          notesBox.querySelector('#notes-content').textContent = dev.clientVisibleNotes;
          deliveryCard.appendChild(notesBox);
        }

        wrapper.appendChild(deliveryCard);
      }

      // 4. BILLING & INVOICE STATUS
      const inv = payload.invoice;
      const isPaymentStage = ['invoice_sent', 'waiting_payment', 'completed'].includes(bp.overallStatus);
      if (isPaymentStage || inv.invoiceNumber !== "[Invoice Number]") {
        const billingCard = document.createElement('div');
        billingCard.className = 'card';
        billingCard.style.display = 'flex';
        billingCard.style.flexDirection = 'column';
        billingCard.style.gap = '16px';
        billingCard.innerHTML = `
          <h2>💳 ${t.invoicePayment}</h2>
          <div class="grid-three">
            <div class="meta-item">
              <span class="meta-label">${t.invoiceNumber}</span>
              <span class="meta-val" id="inv-no"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t.paymentStatus}</span>
              <span class="meta-val" id="inv-status"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t.amountDue}</span>
              <span class="meta-val" id="inv-due"></span>
            </div>
          </div>
        `;
        billingCard.querySelector('#inv-no').textContent = inv.invoiceNumber;
        billingCard.querySelector('#inv-status').textContent = inv.paymentStatus;
        billingCard.querySelector('#inv-due').textContent = inv.amountDueLabel;
        wrapper.appendChild(billingCard);
      }

      // 5. FREELANCER INFO FOOTER
      const fl = payload.freelancer;
      const footerCard = document.createElement('div');
      footerCard.className = 'card';
      
      const flInitials = fl.name ? fl.name.split(' ').map(x => x[0]).slice(0, 2).join('').toUpperCase() : 'YK';
      const hasAvatar = fl.avatar && (fl.avatar.startsWith('http') || fl.avatar.startsWith('data:image'));
      const avatarHtml = hasAvatar 
        ? `<img src="${safeUrl(fl.avatar)}" alt="${fl.name}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.outerHTML='${flInitials}'">`
        : flInitials;

      footerCard.innerHTML = `
        <div class="freelancer-footer">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="user-avatar" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%); color: #fff; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;">
              ${avatarHtml}
            </div>
            <div class="freelancer-info">
              <span class="freelancer-name" id="fl-name"></span>
              <span class="freelancer-role" id="fl-role"></span>
            </div>
          </div>
          <div id="fl-contact-box"></div>
        </div>
      `;
      footerCard.querySelector('#fl-name').textContent = fl.name;
      footerCard.querySelector('#fl-role').textContent = fl.role;
      const box = footerCard.querySelector('#fl-contact-box');
      if (fl.portfolioLink) {
        const a = document.createElement('a');
        a.className = 'btn-link';
        a.style.background = 'rgba(255,255,255,0.06)';
        a.style.color = 'var(--text-light)';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'Portfolio Website';
        a.href = safeUrl(fl.portfolioLink);
        box.appendChild(a);
      }
      wrapper.appendChild(footerCard);

      // 6. DISCLAIMER & TIMESTAMP
      const disclaimer = document.createElement('div');
      disclaimer.className = 'disclaimer-box';
      disclaimer.innerHTML = `
        <span>💡 <span id="disc-limitation"></span></span>
        <span>🔒 <span id="disc-desc"></span></span>
        <span style="font-size: 0.68rem; margin-top: 6px; color: var(--text-secondary); opacity: 0.7;">
          ${t.generatedOn}: <span id="disc-time"></span>
        </span>
      `;
      disclaimer.querySelector('#disc-limitation').textContent = t.limitation;
      disclaimer.querySelector('#disc-desc').textContent = t.disclaimer;
      disclaimer.querySelector('#disc-time').textContent = formatDateStr(payload.timestamp);
      wrapper.appendChild(disclaimer);

      root.appendChild(wrapper);
    }

    // Run on load
    window.addEventListener('load', renderBriefing);
    // Reload on hash change
    window.addEventListener('hashchange', renderBriefing);
  </script>

</body>
</html>
